<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="shortcut icon" href="public/images/LOGO 2.png" />
    <title>HOME: ULTRA MRF</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/index.css" />
  </head>

  <body>
    <nav>
      <a href="index.html" class="nav-logo">
        <img src="public/images/LOGO 2.png" alt="ULTRA MRF Logo" />
      </a>
      <button class="hamburger" id="hamburgerBtn" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
      <ul id="navMenu">
        <li><a href="index.html" class="active">HOME</a></li>
        <li><a href="products.html">PRODUCTS</a></li>
        <li><a href="contacts.html">CONTACT</a></li>
      </ul>
    </nav>

    <header class="hero">
      <img
        src="public/images/mrf2.jpg"
        alt="Ultra MRF Background"
        class="hero-bg"
      />
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <img src="public/images/LOGO 2.png" alt="ULTRA MRF Logo" class="hero-logo" />
        <p class="hero-tagline">Premium Tires & Mags in Pampanga</p>
      </div>
    </header>

    <main class="container">
      <section class="search-section">
        <div class="search-bar">
          <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchInput" placeholder="Search tires, mags, brands..." />
          <button id="searchBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </button>
        </div>
      </section>

      <section class="product-section">
        <h2>Product Results</h2>
        <div id="productResults">
          <div class="empty-state">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <p>Search for a product above to see results</p>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <div class="footer-top">
        <div class="footer-brand">
          <img src="public/images/LOGO 2.png" alt="ULTRA MRF" class="footer-logo" />
          <p class="footer-tagline">Premium Tires, Mags & Services in Pampanga</p>
        </div>
        <div class="footer-nav">
          <h4>Quick Links</h4>
          <a href="index.html">Home</a>
          <a href="products.html">Products</a>
          <a href="contacts.html">Contact</a>
        </div>
        <div class="footer-social">
          <h4>Follow Us</h4>
          <div class="social-links">
            <a href="https://www.facebook.com/UltraMRFtires" target="_blank" rel="noopener noreferrer" class="social-btn" aria-label="Facebook">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            </a>
          </div>
        </div>
      </div>
      <div class="footer-bottom">
        <p>&copy; <span id="footerYear"></span> ULTRA MRF. All Rights Reserved.</p>
      </div>
    </footer>

    <button class="back-to-top" id="backToTop" aria-label="Back to top">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>
    </button>

    <script>
      document.getElementById('hamburgerBtn').addEventListener('click', function() {
        document.getElementById('navMenu').classList.toggle('open');
        this.classList.toggle('active');
      });
      document.getElementById('footerYear').textContent = new Date().getFullYear();

      // Hero parallax
      const heroBg = document.querySelector('.hero-bg');
      window.addEventListener('scroll', function() {
        const scrolled = window.pageYOffset;
        if (heroBg) heroBg.style.transform = 'translateY(' + scrolled * 0.35 + 'px) scale(1.1)';
      });

      // Scroll animations
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('animate-in');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });

      document.querySelectorAll('.product-item, .search-section, .product-section h2').forEach(el => {
        el.classList.add('animate-on-scroll');
        observer.observe(el);
      });

      // Observe dynamically added product items
      const resultsDiv = document.getElementById('productResults');
      const mutationObs = new MutationObserver(() => {
        resultsDiv.querySelectorAll('.product-item:not(.animate-on-scroll)').forEach(el => {
          el.classList.add('animate-on-scroll');
          observer.observe(el);
        });
      });
      mutationObs.observe(resultsDiv, { childList: true });

      // Back to top
      const backBtn = document.getElementById('backToTop');
      window.addEventListener('scroll', function() {
        backBtn.classList.toggle('visible', window.pageYOffset > 400);
      });
      backBtn.addEventListener('click', function() {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    </script>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/9.20.0/firebase-app.js";
      import {
        getFirestore,
        collection,
        getDocs,
      } from "https://www.gstatic.com/firebasejs/9.20.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyBWZsKvQyPhae_X3DJxwwqtZcmvKwQys_U",
        authDomain: "ultramrfdatabase2024.firebaseapp.com",
        projectId: "ultramrfdatabase2024",
        storageBucket: "ultramrfdatabase2024.appspot.com",
        messagingSenderId: "176584988594",
        appId: "1:176584988594:web:68ceb4db9026c9c2c5f6ab",
        measurementId: "G-W50RSDJ3Q2",
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      async function searchProductsByName(productName) {
        const productResultsDiv = document.getElementById("productResults");
        productResultsDiv.innerHTML = '<div class="loading-spinner"><div class="spinner"></div><p>Searching products...</p></div>';

        try {
          const productCollection = collection(db, "centralized_database");
          const productSnapshot = await getDocs(productCollection);
          const productList = productSnapshot.docs.map((doc) => doc.data());

          const filteredProducts = productList.filter((product) =>
            product.product_name.toLowerCase().includes(productName.toLowerCase())
          );

          productResultsDiv.innerHTML = "";

          if (filteredProducts.length > 0) {
            filteredProducts.forEach((product) => {
              productResultsDiv.innerHTML += `
                <div class="product-item">
                  <h2 class="biggest"><strong>${product.product_name}</strong></h2>
                  <h3 class="bigger"><strong>₱${product.price}</strong></h3>
                  <p class="capitalized"><strong>${product.category}</strong></p>
                  <p><strong>${product.branch}</strong></p>
                  <p>Quantity: <strong>${product.quantity}</strong></p>
                </div>
              `;
            });
          } else {
            productResultsDiv.innerHTML = `
              <div class="no-results">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
                <p>No products found for "<strong>${productName}</strong>"</p>
                <span>Try a different search term or check your spelling</span>
              </div>`;
          }
        } catch (error) {
          console.error("Error searching products: ", error);
          productResultsDiv.innerHTML = `
            <div class="no-results">
              <p>Something went wrong. Please try again.</p>
            </div>`;
        }
      }

      function handleSearch() {
        const searchInput = document.getElementById("searchInput").value.trim();
        if (searchInput) {
          searchProductsByName(searchInput);
        }
      }

      document.getElementById("searchBtn").addEventListener("click", handleSearch);
      document.getElementById("searchInput").addEventListener("keydown", (e) => {
        if (e.key === "Enter") handleSearch();
      });
    </script>
  </body>
</html>
