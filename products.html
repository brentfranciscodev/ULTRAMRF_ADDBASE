<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/products.css" />
    <link rel="shortcut icon" href="public/images/LOGO 2.png" />
    <title>PRODUCTS: ULTRA MRF</title>
  </head>

  <body>
    <nav>
      <a href="index.html" class="nav-logo">
        <img src="public/images/LOGO 2.png" alt="Logo" />
      </a>
      <button class="hamburger" id="hamburgerBtn" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
      <ul id="navMenu">
        <li><a href="index.html">HOME</a></li>
        <li><a href="catalog.html">CATALOG</a></li>
        <li><a href="contacts.html">CONTACT</a></li>
      </ul>
    </nav>

    <div class="page-header">
      <h1>TIRES AND MAGS</h1>
      <p>Our best selling collections!</p>
    </div>

    <main class="all-products">
      <div id="products">
        <ul id="skeleton-list" class="skeleton-grid">
          <li class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line wide"></div><div class="skeleton-line medium"></div><div class="skeleton-line short"></div></div></li>
          <li class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line wide"></div><div class="skeleton-line medium"></div><div class="skeleton-line short"></div></div></li>
          <li class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line wide"></div><div class="skeleton-line medium"></div><div class="skeleton-line short"></div></div></li>
          <li class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line wide"></div><div class="skeleton-line medium"></div><div class="skeleton-line short"></div></div></li>
          <li class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line wide"></div><div class="skeleton-line medium"></div><div class="skeleton-line short"></div></div></li>
          <li class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line wide"></div><div class="skeleton-line medium"></div><div class="skeleton-line short"></div></div></li>
        </ul>
        <ul id="product-list"></ul>
      </div>
    </main>

    <footer>
      <div class="footer-top">
        <div class="footer-brand">
          <img src="public/images/LOGO 2.png" alt="ULTRA MRF" class="footer-logo" />
          <p class="footer-tagline">Premium Tires, Mags & Services in Pampanga</p>
        </div>
        <div class="footer-nav">
          <h4>Quick Links</h4>
          <a href="index.html">Home</a>
          <a href="catalog.html">Catalog</a>
          <a href="contacts.html">Contact</a>
        </div>
        <div class="footer-social">
          <h4>Follow Us</h4>
          <div class="social-links">
            <a href="https://www.facebook.com/UltraMRFtires" target="_blank" rel="noopener noreferrer" class="social-btn" aria-label="Facebook">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            </a>
          </div>
        </div>
      </div>
      <div class="footer-bottom">
        <p>&copy; <span id="footerYear"></span> ULTRA MRF. All Rights Reserved.</p>
      </div>
    </footer>

    <button class="back-to-top" id="backToTop" aria-label="Back to top">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>
    </button>

    <script>
      document.getElementById('hamburgerBtn').addEventListener('click', function() {
        document.getElementById('navMenu').classList.toggle('open');
        this.classList.toggle('active');
      });
      document.getElementById('footerYear').textContent = new Date().getFullYear();

      const navEl = document.querySelector('nav');
      function updateNav() {
        navEl.classList.toggle('scrolled', window.pageYOffset > 10);
      }
      window.addEventListener('scroll', updateNav);
      updateNav();

      // Scroll animations
      const scrollObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('animate-in');
            scrollObserver.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });

      document.querySelectorAll('.page-header h1, .page-header p').forEach(el => {
        el.classList.add('animate-on-scroll');
        scrollObserver.observe(el);
      });

      // Back to top
      const backBtn = document.getElementById('backToTop');
      window.addEventListener('scroll', function() {
        backBtn.classList.toggle('visible', window.pageYOffset > 400);
      });
      backBtn.addEventListener('click', function() {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    </script>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/9.20.0/firebase-app.js";
      import {
        getFirestore,
        collection,
        getDocs,
      } from "https://www.gstatic.com/firebasejs/9.20.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyBWZsKvQyPhae_X3DJxwwqtZcmvKwQys_U",
        authDomain: "ultramrfdatabase2024.firebaseapp.com",
        projectId: "ultramrfdatabase2024",
        storageBucket: "ultramrfdatabase2024.appspot.com",
        messagingSenderId: "176584988594",
        appId: "1:176584988594:web:68ceb4db9026c9c2c5f6ab",
        measurementId: "G-W50RSDJ3Q2",
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      async function fetchData() {
        const productList = document.getElementById("product-list");
        const skeleton = document.getElementById("skeleton-list");
        productList.innerHTML = "";

        try {
          const querySnapshot = await getDocs(collection(db, "products"));
          skeleton.style.display = "none";
          productList.style.display = "grid";
          querySnapshot.forEach((doc) => {
            const data = doc.data();
            const li = document.createElement("li");
            li.classList.add('animate-on-scroll');
            li.innerHTML = `
              <span class="product-name">${data.product_name}</span><br/><br/>
              <div class="img-wrapper">
                <img src="public/images/${data.product_name.toLowerCase()}.jpg" onerror="this.src='public/images/LOGO 2.png'; this.style.objectFit='contain'; this.style.padding='30px'; this.style.background='#2a2a2a';">
                <div class="img-overlay">
                  <span>View Details</span>
                </div>
              </div>
              <div class="product">
                <p>${data.product_name}</p>
                <p class="product-price">₱${data.price}</p>
                <p>${data.category}</p>
                <p>${data.branch}</p>
              </div>
            `;
            productList.appendChild(li);
            scrollObserver.observe(li);
          });
        } catch (error) {
          console.error("Error fetching data: ", error);
          skeleton.style.display = "none";
          productList.style.display = "grid";
          productList.innerHTML = '<li class="error-msg"><p>Error loading products. Please try again later.</p></li>';
        }
      }

      fetchData();
    </script>
  </body>
</html>
