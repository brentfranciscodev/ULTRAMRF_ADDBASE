<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/products.css" />
    <link rel="shortcut icon" href="public/images/LOGO 2.png" />
    <title>PRODUCTS: ULTRA MRF</title>
  </head>

  <body>
    <nav>
      <a href="index.html" class="nav-logo">
        <img src="public/images/LOGO 2.png" alt="Logo" />
      </a>
      <button class="hamburger" id="hamburgerBtn" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
      <ul id="navMenu">
        <li><a href="index.html">HOME</a></li>
        <li><a href="products.html" class="active">PRODUCTS</a></li>
        <li><a href="contacts.html">CONTACT</a></li>
      </ul>
    </nav>

    <div class="page-header">
      <h1>TIRES AND MAGS</h1>
      <p>Our best selling collections!</p>
    </div>

    <main class="all-products">
      <div id="products">
        <ul id="product-list"></ul>
      </div>
    </main>

    <footer>
      <div class="footer-content">
        <img src="public/images/LOGO 2.png" alt="ULTRA MRF" class="footer-logo" />
        <p>&copy; 2024 ULTRA MRF. All Rights Reserved.</p>
        <div class="footer-links">
          <a href="index.html">Home</a>
          <a href="products.html">Products</a>
          <a href="contacts.html">Contact</a>
        </div>
      </div>
    </footer>

    <script>
      document.getElementById('hamburgerBtn').addEventListener('click', function() {
        document.getElementById('navMenu').classList.toggle('open');
        this.classList.toggle('active');
      });
    </script>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/9.20.0/firebase-app.js";
      import {
        getFirestore,
        collection,
        getDocs,
      } from "https://www.gstatic.com/firebasejs/9.20.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyBWZsKvQyPhae_X3DJxwwqtZcmvKwQys_U",
        authDomain: "ultramrfdatabase2024.firebaseapp.com",
        projectId: "ultramrfdatabase2024",
        storageBucket: "ultramrfdatabase2024.appspot.com",
        messagingSenderId: "176584988594",
        appId: "1:176584988594:web:68ceb4db9026c9c2c5f6ab",
        measurementId: "G-W50RSDJ3Q2",
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      async function fetchData() {
        const productList = document.getElementById("product-list");
        productList.innerHTML = "";

        try {
          const querySnapshot = await getDocs(collection(db, "products"));
          querySnapshot.forEach((doc) => {
            const data = doc.data();

            const li = document.createElement("li");

            li.innerHTML = `
              <span class="product-name">${data.product_name}</span><br/><br/>
              <img src="public/images/${data.product_name.toLowerCase()}.jpg">
              <div class="product">
              <p>${data.product_name}" <p/>
              <p>${data.category} <br />₱${data.price}</p> <p>${
              data.branch
            }</p> 
            </div>
            `;

            productList.appendChild(li);
          });
        } catch (error) {
          console.error("Error fetching data: ", error);
          productList.innerHTML =
            "<p>Error loading products. Please try again later.</p>";
        }
      }

      fetchData();
    </script>
  </body>
</html>
